global
    log stdout format raw local0

defaults
    mode http
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend http_front
    bind *:8080
    default_backend http_back

backend http_back
    balance roundrobin
    option httpchk GET /actuator/health

    server app1 employees-app-1:8080 check
    server app2 employees-app-2:8080 check
